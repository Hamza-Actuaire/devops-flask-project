- name: Configure EC2 instances
  hosts: all
  become: true
  tasks:
    - name: Update packages
      dnf:
        name: "*"
        state: latest
        update_only: true

    - name: Install Docker
      dnf:
        name: docker
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: true
