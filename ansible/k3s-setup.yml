- name: Install k3s on master
  hosts: master
  become: true
  tasks:
    - name: Install k3s server
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for node token
      wait_for:
        path: /var/lib/rancher/k3s/server/node-token
        timeout: 60

    - name: Read node token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: node_token

    - name: Save token as fact
      set_fact:
        k3s_token: "{{ node_token.content | b64decode | trim }}"

- name: Install k3s on worker
  hosts: worker
  become: true
  tasks:
    - name: Install k3s agent
      shell: |
        curl -sfL https://get.k3s.io | K3S_URL=https://{{ hostvars[groups['master'][0]].inventory_hostname }}:6443 K3S_TOKEN={{ hostvars[groups['master'][0]].k3s_token }} sh -
      args:
        creates: /usr/local/bin/k3s-agent
