name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Construire l'image Docker
        run: docker build -t hekmz/flask-devops-app:latest ./app

      - name: Pousser l'image sur Docker Hub
        run: docker push hekmz/flask-devops-app:latest

      - name: Préparer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/devops-key.pem
          chmod 600 ~/.ssh/devops-key.pem

      - name: Vérifier le host
        run: |
          echo "Host utilisé:"
          echo "${{ secrets.EC2_HOST }}"
          ping -c 2 ${{ secrets.EC2_HOST }} || true
          ssh-keyscan -T 10 -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Vérifier la connectivité vers le serveur
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copier deployment.yaml sur le master
        run: |
          scp -i ~/.ssh/devops-key.pem k8s/deployment.yaml ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/

      - name: Déployer sur Kubernetes
        run: |
          ssh -i ~/.ssh/devops-key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "sudo k3s kubectl apply -f /home/ec2-user/deployment.yaml && sudo k3s kubectl rollout restart deployment flask-app && sudo k3s kubectl get pods"
